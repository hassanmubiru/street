version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: street_test_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: street
      POSTGRES_PASSWORD: street_secret
      POSTGRES_DB: street_test
    ports:
      - "55432:5432"
    volumes:
      - ./docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U street"]
      interval: 5s
      timeout: 5s
      retries: 30
