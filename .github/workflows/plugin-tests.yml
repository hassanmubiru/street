# .github/workflows/plugin-tests.yml
# Offline unit tests for the official plugin packages (Outstanding Action #21 /
# CI-evidence baseline). Builds @streetjs/core then builds + runs the node:test
# suite of every packages/plugin-* that declares a `test` script — including the
# timeout, TLS-config, and webhook-verifier validation tests. Offline only: no
# network and no service containers, so it is deterministic and fast.
#
# This complements ci-cd.yml (core + CLI) and the live integration workflows
# (vendor-integration, *-integration), which require credentials/containers.
name: plugin-tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages/plugin-*/**'
      - 'packages/core/**'
      - 'scripts/test-plugins-offline.mjs'
      - '.github/workflows/plugin-tests.yml'
  pull_request:
    paths:
      - 'packages/plugin-*/**'
      - 'packages/core/**'
      - 'scripts/test-plugins-offline.mjs'
      - '.github/workflows/plugin-tests.yml'

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: plugin-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-offline-tests:
    name: Plugin offline tests (build + node:test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          node-version: '20'
      - name: Run offline plugin test suites
        run: npm run test:plugins-offline
