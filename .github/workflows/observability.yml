# .github/workflows/observability.yml
# Observability pack verification: emit the Prometheus rules + Grafana dashboard,
# then run Prometheus' own `promtool check rules` for semantic validation (the
# step that is unavailable in the offline dev environment).
name: observability

on:
  workflow_dispatch:
  pull_request:
    paths: ['packages/core/src/observability/**', 'scripts/observability/**', '.github/workflows/observability.yml']

permissions:
  contents: read

jobs:
  promtool:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build core
        run: npm run build -w packages/core

      - name: Emit + structurally validate assets
        run: node scripts/observability/emit-assets.mjs

      - name: Install promtool
        run: |
          PROM_VERSION=2.53.0
          curl -fsSL -o prom.tar.gz "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          tar xzf prom.tar.gz
          sudo cp "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/

      - name: promtool check rules (semantic validation)
        run: promtool check rules observability/prometheus/street-rules.yml

      - name: promtool test rules (alert behaviour unit tests)
        working-directory: observability/prometheus
        run: promtool test rules street-rules.test.yml

      - name: Validate Grafana dashboards JSON
        run: |
          for f in observability/grafana/dashboards/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('valid: $f')"
          done
