name: Deploy Documentation to GitHub Pages

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/cli/package.json'
      - 'packages/plugin-*/package.json'
      - 'scripts/gen-plugins-data.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────────────────────
# Minimal default: read-only contents. The deploy job declares pages: write
# and id-token: write at job level — only it needs those permissions.
permissions:
  contents: read

# ── Concurrency ───────────────────────────────────────────────────────────────
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Single source of truth for the displayed version is the published CLI
      # package. Inject it into the Jekyll config at build time so the homepage
      # hero and SoftwareApplication JSON-LD (both read {{ site.version }}) can
      # never drift from the released package. The committed `version:` in
      # docs/_config.yml remains a valid fallback for local builds.
      - name: Sync site version from @streetjs/cli
        run: |
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          echo "Injecting CLI version '$VERSION' into docs/_config.yml"
          sed -i -E "s/^version:.*/version:     \"${VERSION}\"/" docs/_config.yml
          grep -E "^version:" docs/_config.yml

      - name: Generate plugin marketplace data + pages
        run: |
          node scripts/gen-plugins-data.mjs

      - name: Setup Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version:      '3.3'
          bundler-cache:     true
          working-directory: docs

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_site

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs:   build

    permissions:
      pages:    write
      id-token: write

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
