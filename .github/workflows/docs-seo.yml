name: Docs SEO

# Builds the Jekyll documentation site and asserts the SEO artifacts render
# (sitemap.xml, robots.txt → sitemap, Open Graph + description + JSON-LD on the
# home page, and the docs search index). Complements the deploy in pages.yml.

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/docs/assert-seo.mjs'
      - '.github/workflows/docs-seo.yml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: docs-seo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-seo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs
      - name: Build site
        run: bundle exec jekyll build
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Assert SEO artifacts
        working-directory: .
        env:
          SITE_DIR: docs/_site
        run: node scripts/docs/assert-seo.mjs
