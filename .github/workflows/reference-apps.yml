name: Reference Apps

# Builds the workspace packages the reference apps depend on, then runs every
# reference-app end-to-end smoke test. Keeps the production reference backends
# continuously verified.

on:
  push:
    paths:
      - 'examples/reference-apps/**'
      - 'packages/**'
      - 'scripts/verify-reference-apps.sh'
      - '.github/workflows/reference-apps.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reference-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build packages used by the reference apps
        run: |
          npm run build -w packages/core
          npm run build -w packages/ai
          npm run build -w packages/commerce
          npm run build -w packages/admin
          npm run build -w packages/dating-profiles
          npm run build -w packages/plugin-htmx

      - name: Run reference-app smoke tests
        run: bash scripts/verify-reference-apps.sh

      - name: Run reference-app domain benchmarks
        run: node scripts/benchmark-reference-apps.mjs
