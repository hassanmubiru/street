name: Sync labels

# Applies .github/labels.yml to the repository so the labels referenced by the
# issue templates and the community program actually exist. Non-destructive
# (creates/updates only; never deletes). Uses the preinstalled `gh` CLI — no
# third-party action, so no unpinned dependency.

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - 'scripts/sync-labels.mjs'
      - '.github/workflows/labels.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: sync-labels
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Sync labels from manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/sync-labels.mjs
