name: Secret Scanning

# Defense-in-depth secret scanning: Gitleaks (rule-based, config in
# .gitleaks.toml) and TruffleHog (verified-secret detection). Runs on every push
# and PR and fails the build if a secret is detected. GitHub's native secret
# scanning + push protection (enabled in repo settings) is the third layer.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0          # full history so commit-level scanning works
          persist-credentials: false
      - name: Gitleaks scan
        # SHA-pinned; dependabot (configured) keeps this digest updated.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: TruffleHog verified-secret scan
        # SHA-pinned; dependabot (configured) keeps this digest updated.
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: --only-verified
