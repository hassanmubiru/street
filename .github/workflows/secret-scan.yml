name: Secret Scanning

# Defense-in-depth secret scanning: Gitleaks (rule-based, config in
# .gitleaks.toml) and TruffleHog (verified-secret detection). Runs on every push
# and PR and fails the build if a secret is detected. GitHub's native secret
# scanning + push protection (enabled in repo settings) is the third layer.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # full history so commit-level scanning works
          persist-credentials: false
      - name: Gitleaks scan (free CLI binary — the gitleaks-action wrapper now
              requires a paid license; the gitleaks engine itself is open-source)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version
          # Scan full git history; fail (exit non-zero) if any secret is found.
          ./gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: TruffleHog verified-secret scan
        # SHA-pinned; dependabot (configured) keeps this digest updated.
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          extra_args: --only-verified
