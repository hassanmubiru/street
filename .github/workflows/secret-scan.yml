name: Secret Scanning

# Defense-in-depth secret scanning: Gitleaks (rule-based, config in
# .gitleaks.toml) and TruffleHog (verified-secret detection). Runs on every push
# and PR and fails the build if a secret is detected. GitHub's native secret
# scanning + push protection (enabled in repo settings) is the third layer.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0          # full history so commit-level scanning works
          persist-credentials: false
      - name: Gitleaks scan
        # Tag-pinned; dependabot (configured) will pin to a SHA on update.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: TruffleHog verified-secret scan
        uses: trufflesecurity/trufflehog@1c2f3e58df0cd80e3085d9c3dc4c2f1f2a3c2f4e # v3.90.8
        with:
          extra_args: --only-verified
