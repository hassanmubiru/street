name: RabbitMQ Integration

on:
  push:
    paths:
      - 'packages/core/src/transports/rabbitmq/**'
      - 'packages/core/src/integration/rabbitmq/**'
      - '.github/workflows/rabbitmq-integration.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rabbitmq-integration:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 12

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Compile tests
        run: npx tsc
        working-directory: packages/core

      - name: Run RabbitMQ integration tests
        env:
          RABBITMQ_HOST: 127.0.0.1
          RABBITMQ_PORT: 5672
        run: node --test --test-timeout=25000 dist/src/integration/rabbitmq/*.integration.test.js
        working-directory: packages/core
