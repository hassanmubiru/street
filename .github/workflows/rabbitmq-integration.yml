name: RabbitMQ Integration

on:
  push:
    paths:
      - 'packages/core/src/transports/rabbitmq/**'
      - 'packages/core/src/integration/rabbitmq/**'
      - '.github/workflows/rabbitmq-integration.yml'
  pull_request:
  workflow_dispatch:

jobs:
  rabbitmq-integration:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Compile tests
        run: npx tsc
        working-directory: packages/core

      - name: Run RabbitMQ integration tests
        env:
          RABBITMQ_HOST: 127.0.0.1
          RABBITMQ_PORT: 5672
        run: node --test --test-timeout=25000 dist/src/integration/rabbitmq/*.integration.test.js
        working-directory: packages/core
