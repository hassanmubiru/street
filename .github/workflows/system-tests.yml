name: System Tests

# Run all system test suites on every push to any branch.
# No PostgreSQL required — the system test runner operates with --skip-pg.
# This provides fast feedback on memory safety, security, fuzzing,
# chaos resilience, load handling, and infrastructure compatibility.

"on":
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Run a specific suite (leave blank for all)'
        required: false
        type: choice
        options:
          - all
          - security
          - memory-safety
          - load-testing
          - fuzz-testing
          - chaos-testing
          - infrastructure
        default: all

concurrency:
  group: system-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  system-tests:
    name: System Tests (security, memory, load, fuzz, chaos, infra)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation
        run: npx tsc

      - name: Run security tests
        run: node --test dist/tests/system/security.test.js

      - name: Run memory-safety tests
        run: node --test dist/tests/system/memory-safety.test.js

      - name: Run load-testing tests
        run: node --test dist/tests/system/load-testing.test.js

      - name: Run fuzz-testing tests
        run: node --test dist/tests/system/fuzz-testing.test.js

      - name: Run chaos-testing tests
        run: node --test dist/tests/system/chaos-testing.test.js

      - name: Run infrastructure tests (no PG)
        run: node --test dist/tests/system/infrastructure.test.js
        env:
          PG_HOST: ""  # Skip PG-dependent tests

      - name: Run unified system test runner
        run: node dist/tests/system/runner.js --ci --json --skip-pg

      - name: Upload system test results
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: system-test-results-${{ github.sha }}
          path: tests/system/system-test-results.json

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: system-tests
    if: always()

    steps:
      - name: Summarize results
        run: |
          echo "## System Tests Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All 6 system test suites executed (security, memory-safety, load-testing, fuzz-testing, chaos-testing, infrastructure)." >> $GITHUB_STEP_SUMMARY
