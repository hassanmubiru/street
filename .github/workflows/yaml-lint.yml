name: YAML Lint

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: yaml-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate YAML syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: '3.x'

      - name: Validate all YAML files
        run: python3 -c "
import os, sys
import yaml

errors = 0
for root, dirs, files in os.walk('.'):
    dirs[:] = [d for d in dirs if d not in ('node_modules', '.git')]
    for f in files:
        if not (f.endswith('.yml') or f.endswith('.yaml')):
            continue
        path = os.path.join(root, f)
        try:
            data = yaml.safe_load(open(path))
        except yaml.YAMLError as e:
            print(f'::error title=YAML Syntax Error,file={path}::{e}')
            errors += 1
            continue
        # Also verify top-level structure for workflow files
        if '.github/workflows/' in path:
            if not isinstance(data, dict):
                print(f'::error title=Invalid Workflow,file={path}::Root must be a mapping')
                errors += 1
            elif 'name' not in data:
                print(f'::warning title=Missing name,file={path}::Workflow missing \"name\" key')
        print(f'  OK: {path}')
if errors:
    sys.exit(1)
"
