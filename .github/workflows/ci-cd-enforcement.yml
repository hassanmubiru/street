name: CI/CD Enforcement

# ── Policy Enforcement Workflow ────────────────────────────────────────────
# Enforces code quality gates, security audits, and backward-compat checks.
# Runs in parallel with the main ci-cd.yml workflow.

"on":
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to enforce (MAJOR.MINOR.PATCH, no leading v)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # ── code-hygiene: Scan for TODOs, FIXMEs, HACKs, @ts-ignore ─────────────
  # Fails the build if any of these markers are found in packages/core/src/
  code-hygiene:
    name: Code Hygiene Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Scan for prohibited markers
        run: |
          echo "Scanning packages/core/src/ for TODO, FIXME, HACK, @ts-ignore..."
          FOUND=0

          # Scan for TODO
          if grep -rn --include="*.ts" "TODO" packages/core/src/; then
            echo "::error::Found TODO comments in packages/core/src/ — all items must be resolved before merge"
            FOUND=1
          fi

          # Scan for FIXME
          if grep -rn --include="*.ts" "FIXME" packages/core/src/; then
            echo "::error::Found FIXME comments in packages/core/src/ — all items must be resolved before merge"
            FOUND=1
          fi

          # Scan for HACK
          if grep -rn --include="*.ts" "HACK" packages/core/src/; then
            echo "::error::Found HACK comments in packages/core/src/ — all items must be resolved before merge"
            FOUND=1
          fi

          # Scan for @ts-ignore
          if grep -rn --include="*.ts" "@ts-ignore" packages/core/src/; then
            echo "::error::Found @ts-ignore in packages/core/src/ — use @ts-expect-error with a justification comment"
            FOUND=1
          fi

          if [ "$FOUND" -ne 0 ]; then
            exit 1
          fi

          echo "Code hygiene check passed ✔"

  # ── security-audit: npm audit for high/critical vulnerabilities ─────────
  security-audit:
    name: Security Audit (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: '20'

      - name: Run npm audit (high and above)
        run: |
          echo "Running npm audit at high severity level..."
          npm audit --audit-level=high --workspace=packages/core --workspace=packages/cli
          echo "Security audit passed ✔"

  # ── memory-safety: Run memory safety tests with bounded heap ───────────
  memory-safety-enforcement:
    name: Memory Safety Enforcement
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build packages
        run: npm run build:app -w packages/core

      - name: Run memory safety tests (max 256MB heap)
        run: |
          node --max-old-space-size=256 \
            --test \
            packages/core/dist/tests/system/memory-safety.test.js
          echo "Memory safety tests passed ✔"

  # ── backward-compat: Regression tests against prior version ────────────
  backward-compat:
    name: Backward Compatibility Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: street_test
          POSTGRES_USER: street
          POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build current version
        run: npm run build:app -w packages/core

      - name: Run full test suite (backward compat regression)
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: street
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_DATABASE: street_test
          KEK: ${{ secrets.KEK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
        run: |
          echo "Running backward compatibility regression tests..."
          npm test -w packages/core
          npm run build -w packages/core
          npm run build -w packages/cli
          npm test -w packages/cli
          echo "Backward compatibility regression passed ✔"

  # ── release-engineering: Release Scorecard + validation enforcement ─────
  # Purpose:  Build the automated release report THROUGH the zero-dependency
  #           CommandRunner, emitting the machine-readable `release.scorecard`
  #           Verification Artifact (executed command, exit code, ISO-8601
  #           timestamp — Req 11.5). The renderer reuses the core primitives
  #           (`buildReleaseReport`, `isValidSemver`, `validateReleaseNotes`)
  #           and exits non-zero — FAILING the release and NOT publishing — when
  #           semver/release-notes validation fails or an enforced scorecard
  #           control is unsatisfied (Req 11.3 / 11.6).
  # Runs:     only on release triggers (a published release, a v* tag, or a
  #           manual dispatch) — never on ordinary push/PR builds.
  # _Requirements: 11.3, 11.5, 11.6_
  release-engineering:
    name: Release Engineering Enforcement
    if: >-
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: '20'

      - name: Build core package
        run: npm run build -w packages/core

      - name: Resolve release version
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            V="$RELEASE_TAG"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            V="$DISPATCH_VERSION"
          else
            V="$REF_NAME"
          fi
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: ${V:-<from package.json>}"

      - name: Build release report + emit release.scorecard Verification Artifact
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # The renderer reads real scorecard + health evidence from
          # release-inputs.json when present. Under the zero-trust standard, when
          # that evidence is absent the scorecard scores default to 0, the
          # enforced controls fail, and the release is blocked — never published
          # on fabricated scores.
          if [ -f release-inputs.json ]; then
            npm run verify:release -- --inputs release-inputs.json
          else
            echo "::warning::release-inputs.json not found — scorecard scores default to 0; supply scorecard evidence to satisfy the enforced controls (Req 11.6)"
            npm run verify:release
          fi

      - name: Upload release.scorecard Verification Artifact
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-scorecard-artifact-${{ github.sha }}
          path: verification-artifacts/release/
