name: Frontend Integrations CI

# Builds, type-checks and tests the framework integration packages that sit on
# top of @streetjs/client: react, next, vue, nuxt and the UI kits. These declare
# React/Vue/Next as PEER dependencies, so the install relies on the repo .npmrc
# (legacy-peer-deps=true) to keep monorepo resolution deterministic. Offline only
# — no services required; verification is build + tsc --noEmit + export-shape tests.

on:
  push:
    paths:
      - 'packages/client/**'
      - 'packages/react/**'
      - 'packages/next/**'
      - 'packages/vue/**'
      - 'packages/nuxt/**'
      - 'packages/auth-ui/**'
      - 'packages/ai-ui/**'
      - 'packages/admin-ui/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'packages/client/**'
      - 'packages/react/**'
      - 'packages/next/**'
      - 'packages/vue/**'
      - 'packages/nuxt/**'
      - 'packages/auth-ui/**'
      - 'packages/ai-ui/**'
      - 'packages/admin-ui/**'
  workflow_dispatch:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      - name: Build @streetjs/client
        run: npm run build -w packages/client
      - name: Build @streetjs/react
        run: npm run build -w packages/react
      - name: Build @streetjs/next
        run: npm run build -w packages/next
      - name: Build @streetjs/vue
        run: npm run build -w packages/vue
      - name: Build @streetjs/nuxt
        run: npm run build -w packages/nuxt
      - name: Build @streetjs/auth-ui
        run: npm run build -w packages/auth-ui
      - name: Build @streetjs/ai-ui
        run: npm run build -w packages/ai-ui
      - name: Build @streetjs/admin-ui
        run: npm run build -w packages/admin-ui
      - name: Type-check all integrations
        run: |
          npm run lint -w packages/client
          npm run lint -w packages/react
          npm run lint -w packages/next
          npm run lint -w packages/vue
          npm run lint -w packages/nuxt
          npm run lint -w packages/auth-ui
          npm run lint -w packages/ai-ui
          npm run lint -w packages/admin-ui
      - name: Tests
        run: |
          npm test -w packages/client
          npm test -w packages/react
          npm test -w packages/next
          npm test -w packages/vue
          npm test -w packages/nuxt
          npm test -w packages/auth-ui
          npm test -w packages/ai-ui
          npm test -w packages/admin-ui
