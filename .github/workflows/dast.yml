# .github/workflows/dast.yml
# Dynamic Application Security Testing (DAST) pipeline. Builds the app, exports
# the OpenAPI artifact, starts the app, then drives the REAL scanners —
# Schemathesis (OpenAPI-driven) and OWASP ZAP baseline + API scan — against the
# running instance through the framework's CommandRunner
# (scripts/dast/run-dast.mjs). The orchestrator enforces a 30-minute in-script
# watchdog (matching the job's timeout-minutes), records the failure cause
# (target-unavailable / scan-error / timeout) in the DAST Verification Artifact,
# fails the build on any High/Critical finding via the deterministic severity
# gate, and the artifact is uploaded as retained CI evidence (Req 3.1/3.3/3.8/3.9).
name: dast

on:
  workflow_dispatch:
  pull_request:
    paths: ['packages/**', 'scripts/dast/**', 'dast/**', '.github/workflows/dast.yml']
  schedule:
    - cron: '0 3 * * 1'   # weekly

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: dast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dast:
    runs-on: ubuntu-latest
    # 30-minute hard ceiling (Req 3.9); the orchestrator runs an in-script
    # watchdog with the same budget so an overrun is recorded as `timeout` in
    # the artifact before the runner kills the job.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Build
        run: npm run build -w packages/core

      - name: Export OpenAPI artifact
        run: node scripts/dast/export-openapi.mjs --routes dast/routes.json --out dast-reports/openapi.json

      - name: Install Schemathesis
        run: pip install --require-hashes -r dast/requirements.txt

      - name: Start target app
        run: |
          node dast/start-target.mjs &
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:8080/health && break; sleep 1; done
        env:
          PORT: '8080'

      - name: Run DAST scans (Schemathesis + ZAP) through CommandRunner (gated)
        run: |
          node scripts/dast/run-dast.mjs \
            --spec dast-reports/openapi.json \
            --base-url http://127.0.0.1:8080 \
            --fail-on high \
            --report-dir dast-reports \
            --out-dir verification-artifacts/dast
        env:
          # In-script watchdog budget in ms (30 minutes, matching timeout-minutes).
          DAST_TIMEOUT_MS: '1800000'

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dast-reports
          path: dast-reports/
          retention-days: 30

      - name: Upload DAST verification artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dast-verification-artifact
          path: verification-artifacts/dast/
          retention-days: 30
