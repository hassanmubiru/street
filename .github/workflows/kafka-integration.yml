name: Kafka Integration

on:
  push:
    paths:
      - 'packages/core/src/transports/kafka/**'
      - 'packages/core/src/integration/kafka/**'
      - '.github/workflows/kafka-integration.yml'
  pull_request:
  workflow_dispatch:
    inputs:
      cold_starts:
        description: 'Cold-start count (full scale = 100)'
        required: false
        default: '100'
      restart_cycles:
        description: 'Broker-restart cycle count (full scale = 100)'
        required: false
        default: '100'
  schedule:
    # Weekly full-scale chaos run (Mondays 06:00 UTC).
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  kafka-integration:
    runs-on: ubuntu-latest

    services:
      kafka:
        image: apache/kafka:3.7.1
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_NUM_PARTITIONS: 3
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1 || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 24

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Compile tests
        run: npx tsc
        working-directory: packages/core

      - name: Run Kafka codec unit tests
        run: node --test dist/src/tests/kafka-codec.test.js
        working-directory: packages/core

      - name: Run Kafka integration tests
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
        run: node --test --test-timeout=60000 dist/src/integration/kafka/*.integration.test.js
        working-directory: packages/core

  # Full-scale (100/100) cold-start + chaos suite (Layer B, Requirements
  # 9.4–9.8, task 15.5). Runs only on demand or on the weekly schedule — it
  # boots its own apache/kafka:3.7.1 (KRaft) broker via docker-compose and
  # injects broker-restart / network-interruption / connection-loss / slow-broker
  # faults, so it is far heavier than the per-PR integration job above. The
  # driver emits one Verification Artifact per capability through CommandRunner
  # (kafka.coldstart + kafka.chaos.*) and records an honest BLOCKED when no
  # broker can be reached/started.
  kafka-chaos:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w packages/core

      - name: Compile tests + integration suite
        run: npx tsc
        working-directory: packages/core

      - name: Run chaos harness unit tests (offline)
        run: node --test scripts/tests/kafka-chaos-harness.test.mjs

      - name: Run cold-start + chaos suite and emit artifacts
        env:
          COLD_STARTS: ${{ github.event.inputs.cold_starts || '100' }}
          RESTART_CYCLES: ${{ github.event.inputs.restart_cycles || '100' }}
          KAFKA_BROKERS: 127.0.0.1:9092
        run: node scripts/reliability/verify.mjs

      - name: Upload Kafka verification artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kafka-chaos-artifacts
          path: verification-artifacts/kafka/*.artifact.json
          if-no-files-found: warn
          retention-days: 90
