name: Sign plugin-htmx

# One-shot: produce the official Ed25519 signed manifest for @streetjs/plugin-htmx
# and upload it as an artifact, so the marketplace can list it as signed (it was
# the only plugin without a committed manifest.signed.json). Signing requires the
# official key, which exists ONLY as a CI secret — it cannot be produced on a
# workstation. `main` is a protected branch, so this workflow does NOT push;
# download the artifact and commit the signed manifest through the normal flow.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sign-htmx
  cancel-in-progress: false

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: '22'

      - name: Build core (plugin compiles against streetjs)
        run: npm run build -w packages/core

      - name: Build + sign plugin-htmx with the official key
        env:
          STREET_PLUGIN_SIGNING_KEY: ${{ secrets.STREET_PLUGIN_SIGNING_KEY }}
        run: |
          npm run build -w packages/plugin-htmx
          npm run sign -w packages/plugin-htmx

      - name: Verify the manifest is signed by the official key
        run: |
          node -e "
            (async () => {
              const { readFileSync } = require('node:fs');
              const { verifyManifest, officialPluginPublicKey } = await import('streetjs');
              const signed = JSON.parse(readFileSync('packages/plugin-htmx/manifest.signed.json','utf8'));
              if (!verifyManifest(signed, officialPluginPublicKey())) {
                console.error('::error::plugin-htmx manifest is NOT signed by the official key');
                process.exit(1);
              }
              console.log('plugin-htmx manifest verified against the official key');
            })();
          "

      - name: Regenerate marketplace data (htmx now signed)
        run: node scripts/gen-plugins-data.mjs

      - name: Upload signed manifest + regenerated marketplace as an artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugin-htmx-signed
          path: |
            packages/plugin-htmx/manifest.signed.json
            packages/plugin-htmx/manifest.pub
            docs/_data/plugins.json
            docs/plugins/registry/htmx.md
          if-no-files-found: error
          retention-days: 90
