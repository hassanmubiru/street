name: Browser Compatibility

on:
  push:
    paths:
      - 'packages/core/src/browser.ts'
      - 'packages/core/src/browser-stub.ts'
      - 'packages/core/package.json'
      - 'packages/core/src/tests/browser-build.test.ts'
      - '.github/workflows/browser-compat.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: browser-compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-compat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build core (produces dist/browser.js + dist/browser-stub.js)
        run: npm run build -w packages/core

      - name: Compile tests
        run: npx tsc
        working-directory: packages/core

      - name: Run browser export-condition compatibility tests (esbuild platform=browser)
        run: node --test dist/src/tests/browser-build.test.js
        working-directory: packages/core
