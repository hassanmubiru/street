name: Provider Integration

# Runs the @streetjs/search and @streetjs/storage provider integration suites
# against real backends started as service containers. Provider tests are gated
# on env vars, so they execute here and skip cleanly elsewhere.

on:
  push:
    paths:
      - 'packages/search/**'
      - 'packages/storage/**'
      - '.github/workflows/provider-integration.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Search providers: Postgres FTS + Meilisearch (both implemented & tested).
  search-providers:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: street
          POSTGRES_PASSWORD: street_secret
          POSTGRES_DB: street_test
        options: >-
          --health-cmd "pg_isready -U street -d street_test"
          --health-interval 5s --health-timeout 5s --health-retries 30
      meilisearch:
        image: getmeili/meilisearch:v1.10
        ports:
          - 7700:7700
        env:
          MEILI_MASTER_KEY: street_test_key
          MEILI_NO_ANALYTICS: "true"
        options: >-
          --health-cmd "curl -fsS http://127.0.0.1:7700/health || exit 1"
          --health-interval 5s --health-timeout 5s --health-retries 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build core (provides streetjs PgPool)
        run: npm run build -w packages/core

      - name: Run search provider integration tests (PG FTS + Meilisearch)
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: '5433'
          PG_USER: street
          PG_PASSWORD: street_secret
          PG_DATABASE: street_test
          MEILI_HOST: http://127.0.0.1:7700
          MEILI_KEY: street_test_key
        run: npm run test -w packages/search

  # Storage providers: Postgres + GCS + Azure Blob (all implemented & verified).
  # fake-gcs-server backs the GCS provider; Azurite backs the Azure provider.
  storage-providers:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5433:5432
        env:
          POSTGRES_USER: street
          POSTGRES_PASSWORD: street_secret
          POSTGRES_DB: street_test
        options: >-
          --health-cmd "pg_isready -U street -d street_test"
          --health-interval 5s --health-timeout 5s --health-retries 30
      fake-gcs:
        image: fsouza/fake-gcs-server:1.49
        ports:
          - 4443:4443
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:3.32.0
        ports:
          - 10000:10000

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build core (provides streetjs PgPool)
        run: npm run build -w packages/core

      - name: Run storage provider integration tests (Postgres + GCS + Azure)
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: '5433'
          PG_USER: street
          PG_PASSWORD: street_secret
          PG_DATABASE: street_test
          GCS_URL: http://127.0.0.1:4443
          AZURITE_URL: http://127.0.0.1:10000
        run: npm run test -w packages/storage
