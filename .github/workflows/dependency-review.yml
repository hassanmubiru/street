name: Dependency Review

# Supply-chain protection on pull requests: GitHub's dependency-review-action
# inspects added/changed dependencies for known vulnerabilities and
# disallowed licenses, and fails the PR before risky dependencies are merged.
# Complements dependabot (.github/dependabot.yml) and the Scorecard workflow.

on:
  pull_request:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency review (vulnerabilities + license policy)
        # SHA-pinned; dependabot keeps this digest updated.
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail on high+ severity advisories in newly introduced dependencies.
          fail-on-severity: high
          # License policy: deny known-incompatible copyleft/unknown licenses for
          # an MIT-licensed project. Adjust as the policy evolves.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-or-later, GPL-3.0-or-later
          comment-summary-in-pr: on-failure
