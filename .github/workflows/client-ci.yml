name: Client SDK CI

# Builds and tests @streetjs/client (zero-dependency, framework-agnostic SDK).
# Offline only — no services needed.

on:
  push:
    paths:
      - 'packages/client/**'
      - '.github/workflows/client-ci.yml'
  pull_request:
    paths:
      - 'packages/client/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  client-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}
      - name: Build @streetjs/client
        run: npm run build -w packages/client
      - name: Type-check (no emit)
        run: npm run lint -w packages/client
      - name: Unit tests
        run: npm test -w packages/client
