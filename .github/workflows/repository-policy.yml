name: Repository policy

# Enforces the StreetJS repository organization & classification policy
# (governance/CHARTER.md, governance/REPOSITORY-ORGANIZATION.md,
# security/SECURITY-CLASSIFICATION.md). Private-key/secret blocking lives in
# block-private-keys.yml + secret-scan.yml; this workflow enforces *structure*:
# the root-folder allowlist, no RESTRICTED files tracked, and policy-doc presence.

on:
  push:
  pull_request:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: repository-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-folder-allowlist:
    name: Root folder allowlist
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Only approved files may live at the repo root
        run: |
          # Approved root files (CHARTER §1). Directories are not checked here.
          allow=$(cat <<'EOF'
          README.md
          LICENSE
          CHANGELOG.md
          CITATION.cff
          CODE_OF_CONDUCT.md
          CONTRIBUTING.md
          GOVERNANCE.md
          MAINTAINERS.md
          SECURITY.md
          package.json
          package-lock.json
          .npmrc
          .gitignore
          .gitattributes
          .gitleaks.toml
          .dockerignore
          .env.example
          EOF
          )
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! grep -qxF "$f" <<<"$allow"; then
              echo "::error file=$f::Unapproved file at repo root. Move it to a subfolder (security/ audits/ plans/ governance/ docs/ infra/ scripts/) or add it to the allowlist in repository-policy.yml with justification."
              fail=1
            fi
          done < <(git ls-files --full-name | grep -E '^[^/]+$')
          [ "$fail" -eq 0 ] && echo "Root folder allowlist clean ✔"
          exit $fail

  no-restricted-tracked:
    name: No RESTRICTED files tracked
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Block tracked credentials / IaC state / keystores
        run: |
          if git ls-files | grep -EI '\.(pem|key|p12|pfx|crt|jks|keystore|tfstate|tfvars)$|(^|/)kubeconfig$|service-account.*\.json$|credentials.*\.json$|(^|/)\.env$'; then
            echo "::error::A RESTRICTED-tier file is tracked (see security/SECURITY-CLASSIFICATION.md). Remove it and rotate the credential."
            exit 1
          fi
          echo "No RESTRICTED files tracked ✔"

  policy-docs-present:
    name: Governance docs present
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Required governance/security docs must exist
        run: |
          req="governance/CHARTER.md governance/REPOSITORY-ORGANIZATION.md security/SECURITY-CLASSIFICATION.md SECURITY.md .github/CODEOWNERS"
          fail=0
          for f in $req; do
            [ -f "$f" ] || { echo "::error::missing required policy doc: $f"; fail=1; }
          done
          [ "$fail" -eq 0 ] && echo "All governance/security policy docs present ✔"
          exit $fail

  no-plugin-dockerfiles:
    name: Plugins must not ship Dockerfiles
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: No Dockerfile / compose / deploy assets inside packages/plugin-*
        run: |
          # Plugins are libraries — they must not carry container/deploy assets
          # (see audits/DOCKER-REVIEW.md, PLUGIN-SECURITY-STANDARD.md). Deployable
          # services (e.g. packages/registry-server) are intentionally exempt.
          if git ls-files 'packages/plugin-*' | grep -EI '(^|/)(Dockerfile|docker-compose.*\.ya?ml|.*\.tf|.*\.tfvars)$'; then
            echo "::error::A plugin package ships a Dockerfile/compose/IaC asset. Move it to examples/ or infra/docker/."
            exit 1
          fi
          echo "No deploy assets inside plugin packages ✔"
