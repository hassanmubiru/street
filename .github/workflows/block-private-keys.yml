name: Block private keys & verify signing anchor

# Defense-in-depth gate added during the 2026 signing-key rotation
# (see KEY-ROTATION-RUNBOOK.md / SECURITY-AUDIT.md F-1, F-6, F-7).
#
# Fails the build if:
#   1. any private key / keystore file is tracked, or a BEGIN PRIVATE KEY blob
#      appears in tracked content; and
#   2. any committed packages/plugin-*/manifest.pub does not match the embedded
#      official trust anchor (OFFICIAL_PLUGIN_PUBLIC_KEY_PEM).
#
# (2) catches key-drift like the half-finished rotation in F-7, where committed
# manifests were signed by a key other than the embedded anchor.

on:
  push:
  pull_request:

permissions:
  contents: read

# ── Concurrency ────────────────────────────────────────────────
concurrency:
  group: block-private-keys-${{ github.ref }}
  cancel-in-progress: true

jobs:
  block-private-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fail on tracked key / keystore files
        run: |
          if git ls-files | grep -E '\.(pem|key|p12|pfx)$'; then
            echo "::error::A private key / keystore file is tracked. Remove it and rotate the credential."
            exit 1
          fi

      - name: Fail on BEGIN PRIVATE KEY blobs in tracked content
        run: |
          # Match a PEM private-key header on its OWN line (real key material),
          # not inline prose/regex mentions in docs or this workflow itself.
          if git grep -nI -E '^[[:space:]]*-----BEGIN ([A-Z]+ )*PRIVATE KEY-----[[:space:]]*$' -- . ':(exclude)**/*.test.*'; then
            echo "::error::Private key material detected in tracked content."
            exit 1
          fi

  verify-signing-anchor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Every committed manifest.pub must match the embedded official anchor
        run: |
          node -e "
            const { createPublicKey, createHash } = require('node:crypto');
            const fs = require('node:fs');
            const path = require('node:path');
            const fp = (pem) => createHash('sha256')
              .update(createPublicKey(pem).export({ type: 'spki', format: 'der' }))
              .digest('hex');
            const anchorSrc = fs.readFileSync('packages/core/src/platform/plugins/official-key.ts', 'utf8');
            const anchorPem = anchorSrc.match(/-----BEGIN PUBLIC KEY-----[\s\S]*?-----END PUBLIC KEY-----/)[0];
            const anchor = fp(anchorPem);
            console.log('embedded anchor:', anchor);
            let bad = 0;
            for (const dir of fs.readdirSync('packages')) {
              if (!dir.startsWith('plugin-')) continue;
              const pub = path.join('packages', dir, 'manifest.pub');
              if (!fs.existsSync(pub)) continue;
              const f = fp(fs.readFileSync(pub, 'utf8'));
              const ok = f === anchor;
              console.log((ok ? 'OK   ' : 'FAIL ') + pub + ' ' + f);
              if (!ok) bad++;
            }
            if (bad) {
              console.error('::error::' + bad + ' plugin manifest.pub file(s) do not match the embedded official anchor');
              process.exit(1);
            }
          "

  scan-infra-identifiers:
    name: Scan infra for real identifiers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fail on real cloud identifiers in infra/deploy/observability
        run: |
          # Infra assets must be TEMPLATED examples only — no real AWS account IDs
          # (12-digit), ARNs, internal DNS, cluster names, or monitoring URLs.
          # Scans only if the directories exist (deploy/observability may move to infra/).
          targets=""
          for d in infra deploy observability; do [ -d "$d" ] && targets="$targets $d"; done
          [ -z "$targets" ] && { echo "no infra dirs present — skipping"; exit 0; }
          bad=0
          # 12-digit AWS account IDs and ARNs containing one.
          if grep -rInE 'arn:aws[a-z-]*:[a-z0-9-]*:[a-z0-9-]*:[0-9]{12}:' $targets; then
            echo "::error::ARN containing a real account ID found in infra assets."; bad=1; fi
          if grep -rInE '\b[0-9]{12}\b' $targets | grep -viE 'example|0{12}|1234567890|placeholder'; then
            echo "::error::Possible real 12-digit AWS account ID in infra assets."; bad=1; fi
          # Internal DNS / cluster hints.
          if grep -rInE '\.(internal|local|cluster\.local|ec2\.internal)\b' $targets | grep -viE 'example|placeholder'; then
            echo "::error::Possible internal DNS / cluster name in infra assets."; bad=1; fi
          [ "$bad" -eq 0 ] && echo "infra identifier scan clean ✔"
          exit $bad
