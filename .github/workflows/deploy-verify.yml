# .github/workflows/deploy-verify.yml
# Cloud deployment verification (Requirement 2.11). Every supported Deployment
# Target first records honest per-target evidence (a TargetVerification under
# verification-artifacts/cloud/targets/<target>.json): targets whose cloud
# credentials are absent are recorded as an honest BLOCKED with the offline-
# verifiable evidence attached. Kubernetes is then verified live against an
# ephemeral kind cluster — the proven /health/live + /health/ready 1/1 path —
# driven through the zero-dependency `CommandRunner` (scripts/verification/run.mjs),
# which emits the machine-readable `cloud.deploy.kubernetes.artifact.json` and
# reaches VERIFIED only when health + smoke truly pass. A final roll-up step builds
# the cross-target `deployment-report.json`, and all per-target artifacts + the
# report are uploaded via actions/upload-artifact.
name: deploy-verify

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/core/src/cloud/**'
      - 'scripts/cloud/**'
      - 'scripts/verification/**'
      - 'deploy/**'
      - '.github/workflows/deploy-verify.yml'

permissions:
  contents: read

jobs:
  cloud-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build core
        run: npm run build -w packages/core

      # ── Honest per-target offline evidence for every target ──────────────────
      # The offline verifier writes each target's per-target TargetVerification
      # result (verification-artifacts/cloud/targets/<target>.json). Targets whose
      # cloud credentials are absent are recorded as an honest BLOCKED with the
      # specific missing dependency id while STILL attaching the offline-verifiable
      # evidence (manifest validation, helm lint/template, wrangler dry-run, task-def
      # schema, workflow lint). BLOCKED is honest, not a failure, so the loop never
      # fails the build on an absent prerequisite.
      - name: Offline-verify all targets
        run: |
          set -u
          for t in kubernetes cloudrun ecs lambda azure-functions gcf cloudflare-workers; do
            echo "::group::offline-verify ${t}"
            node scripts/cloud/verify-offline.mjs --target "${t}" || true
            echo "::endgroup::"
          done

      # ── Live Kubernetes verification on an ephemeral kind cluster ────────────
      - name: Generate + validate manifest
        run: |
          node -e "
            const { generateManifest, validateDeploymentManifest } = require('streetjs');
            const fs = require('fs');
            const cfg = { name: 'street-app', image: 'street-app:ci', port: 8080, replicas: 1 };
            const m = generateManifest('kubernetes', cfg);
            const v = validateDeploymentManifest('kubernetes', m);
            if (!v.valid) { console.error(v.errors.join('\n')); process.exit(1); }
            fs.writeFileSync('k8s.yaml', m);
            console.log('manifest validated');
          "

      - name: Build app image
        run: docker build -t street-app:ci .

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Load image + apply manifest
        run: |
          kind load docker-image street-app:ci
          kubectl apply -f k8s.yaml
          kubectl rollout status deployment/street-app --timeout=120s

      # Live verify through CommandRunner: probes /health/live + /health/ready and
      # runs the smoke checks, overwriting the kubernetes per-target result with the
      # live VERIFIED outcome and emitting cloud.deploy.kubernetes.artifact.json.
      - name: Verify Kubernetes deployment (CommandRunner)
        run: |
          kubectl port-forward deployment/street-app 8080:8080 &
          PF_PID=$!
          trap 'kill ${PF_PID} 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:8080/health/live && break; sleep 2; done
          node scripts/verification/run.mjs cloud.deploy.kubernetes --docs \
            -- node scripts/cloud/verify-target.mjs --target kubernetes --base-url http://127.0.0.1:8080

      # ── Cross-target roll-up report (Requirement 2.11) ───────────────────────
      # buildDeploymentReport records each target's status + an ISO-8601 timestamp.
      # BLOCKED targets are honest (not a build failure), so the report build does
      # not gate the job; the live Kubernetes step above is what fails on a broken
      # proven path.
      - name: Build deployment verification report
        if: always()
        run: node scripts/cloud/build-report.mjs || true

      - name: Upload cloud deployment verification artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloud-deployment-verification
          path: verification-artifacts/cloud/
