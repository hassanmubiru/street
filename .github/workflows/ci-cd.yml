name: street CI/CD

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  POSTGRES_DB: street_test
  POSTGRES_USER: street
  POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  build-and-test:
    name: Build, Lint, Test
    runs-"on": ubuntu-latest

    env:
      KEK: ${{ secrets.KEK }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: street_test
          POSTGRES_USER: street
          POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-versi"on": ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check & build
        run: npx tsc

      - name: Run integration tests
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: street_test
          PG_USER: street
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          KEK: ${{ secrets.KEK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          PORT: "3001"
        run: node --test dist/tests/integration.test.js

  system-tests:
    name: System Tests (security, memory, load, fuzz, chaos, infra)
    runs-"on": ubuntu-latest
    needs: build-and-test

    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-versi"on": ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (emit JS)
        run: npx tsc

      - name: Run security tests
        run: node --test dist/tests/system/security.test.js

      - name: Run memory-safety tests
        run: node --test dist/tests/system/memory-safety.test.js

      - name: Run load-testing tests
        run: node --test dist/tests/system/load-testing.test.js

      - name: Run fuzz-testing tests
        run: node --test dist/tests/system/fuzz-testing.test.js

      - name: Run chaos-testing tests
        run: node --test dist/tests/system/chaos-testing.test.js

      - name: Run infrastructure tests (no PG)
        run: node --test dist/tests/system/infrastructure.test.js
        env:
          PG_HOST: ""  # Skip PG-dependent tests

      - name: Run unified system test runner
        run: node dist/tests/system/runner.js --ci --json --skip-pg

      - name: Upload system test results
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: system-test-results
          path: tests/system/system-test-results.json

  docker-build:
    name: Docker Build & Push
    runs-"on": ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
