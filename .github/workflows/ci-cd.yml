name: street CI/CD

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  POSTGRES_DB: street_test
  POSTGRES_USER: street
  POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  build-and-test:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    env:
      KEK: ${{ secrets.KEK }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: street_test
          POSTGRES_USER: street
          POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate YAML syntax
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os, sys, yaml
          errors = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git')]
              for f in files:
                  if not (f.endswith('.yml') or f.endswith('.yaml')):
                      continue
                  path = os.path.join(root, f)
                  try:
                      yaml.safe_load(open(path))
                  except yaml.YAMLError as e:
                      msg = str(e).replace('\n', ' | ')
                      print(f'::error title=YAML Syntax Error,file={path}::{msg}')
                      errors += 1
                      continue
                  print(f'  OK: {path}')
          if errors:
              sys.exit(1)
          PYEOF

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check & build (with tests)
        run: npm run build:app -w packages/core

      - name: Run integration tests
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: street_test
          PG_USER: street
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          KEK: ${{ secrets.KEK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          PORT: "3001"
        run: node --test packages/core/dist/tests/integration.test.js

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
