name: street CI/CD

# ── Consolidated CI/CD ────────────────────────────────────────────────────
# This single workflow consolidates all CI/CD into one file — replacing 5
# previously standalone workflows (yaml-lint, security-lint, memory-leak,
# system-tests, publish) that were merged into the original ci-cd base.
# Every job runs in parallel on separate runners for maximum feedback speed.
#
# Architecture overview:
#   ┌─ build-and-test ─── migration-integration ──┬── memory-leak ──┐
#   │  (Core, matrix)     (CLI+unit+PG, matrix)   │  (matrix)       │
#   ├─ system-tests ────── security-lint ─────────┘                  │
#   │  (matrix × 6 suits) (zizmor, single run)                      │
#   └──┬── summary (after system-tests) ──────────────────────────────┘
#      │
#      ├── docker-build  (main branch only, needs build-and-test)
#      └── test-and-publish  (semver tags only, needs build-and-test)
#
# Boilerplate steps (checkout, setup-node, npm ci) are extracted to
# .github/actions/setup — a reusable composite action used by every job.
# Postgres service containers are spun up only for jobs that need them.
# Use workflow_dispatch with a suite input to run a specific system test.
# Tag pushes (v*.*.*) trigger npm publish after core tests pass.

# ── Triggers ───────────────────────────────────────────────────────────────
# Three trigger types control when this workflow runs:
#   push:           Code push to main/develop branches, or any semver tag
#   pull_request:   PR opened/synced targeting main
#   workflow_dispatch: Manual trigger with a suite selector for system tests
"on":
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Run a specific system test suite (leave blank for all)'
        required: false
        type: choice
        options:
          - all
          - security
          - memory-safety
          - load-testing
          - fuzz-testing
          - chaos-testing
          - infrastructure
        default: all

# ── Concurrency ──────────────────────────────────────────────────────────
# Groups all CI runs by git ref. A new push to the same branch/PR cancels
# any in-progress runs — saves runner minutes on iterative pushes.
# On main, we only cancel if the run is still in-progress (not if queued),
# so infrastructure tests are not annotated as cancelled on rapid pushes.
# The publish job uses its own concurrency group to avoid cancellation.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# ── Permissions ──────────────────────────────────────────────────────────
# Minimal default: read-only contents. Jobs that need write or id-token
# permissions (docker-build, test-and-publish) declare them at job level.
permissions:
  contents: read

# ── Shared environment ───────────────────────────────────────────────────
# These values are inherited by all jobs. Jobs can override or extend
# them at the job or step level as needed.
#   PG_*      — PostgreSQL connection parameters for service containers
#   SUITE     — workflow_dispatch input: selects which system test suite to run
env:
  PG_HOST: localhost
  PG_PORT: 5432
  PG_USER: street
  PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
  PG_DATABASE: street_test
  SUITE: ${{ inputs.suite || 'all' }}

jobs:
  # ── build-and-test: Core integration tests (gatekeeper) ────────────────
  # Purpose:   Compile and test the @streetjs/core package against a live
  #            PostgreSQL instance. Runs integration tests with coverage.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled — both must report)
  # Services:  postgres:16-alpine with health check
  # Outputs:   Coverage report artifact uploaded per matrix entry
  # Critical path: Other jobs (docker-build, test-and-publish) depend on this.
  build-and-test:
    name: Core (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    env:
      KEK: ${{ secrets.KEK }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.PG_DATABASE }}
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Validate YAML syntax
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os, sys, yaml
          errors = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git')]
              for f in files:
                  if not (f.endswith('.yml') or f.endswith('.yaml')):
                      continue
                  path = os.path.join(root, f)
                  norm = path.replace(os.sep, '/')
                  # Helm chart templates are Go-templated ({{- ... }}), not valid
                  # YAML — skip them so the syntax check doesn't choke on templating.
                  if 'deploy/helm/' in norm and '/templates/' in norm:
                      continue
                  try:
                      data = yaml.safe_load(open(path))
                  except yaml.YAMLError as e:
                      msg = str(e).replace('\n', ' | ')
                      print(f'::error title=YAML Syntax Error,file={path}::{msg}')
                      errors += 1
                      continue
                  if '.github/workflows/' in path:
                      if not isinstance(data, dict):
                          print(f'::error title=Invalid Workflow,file={path}::Root must be a mapping')
                          errors += 1
                      elif 'name' not in data:
                          print(f'::warning title=Missing name,file={path}::Workflow missing name key')
                  print(f'  OK: {path}')
          if errors:
              sys.exit(1)
          PYEOF

      - name: TypeScript check & build (with tests)
        run: npm run build:app -w packages/core

      - name: Run integration tests with coverage
        env:
          KEK: ${{ secrets.KEK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          PORT: "3001"
        run: npm run coverage -w packages/core

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/core/coverage/

  # ── migration-integration: CLI unit + migration tests (merged) ─────────
  # Purpose:   Run @streetjs/cli package unit tests and migration integration
  #            tests against a live PostgreSQL instance. Merged from the
  #            former separate test-cli-unit + migration-integration jobs
  #            to eliminate duplicate checkout/build overhead.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled)
  # Services:  postgres:16-alpine with health check
  # Outputs:   Coverage report artifacts per matrix entry (unit + migration)
  migration-integration:
    name: CLI Unit + Migration (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.PG_DATABASE }}
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: Build core package (CLI dependency)
        run: npm run build -w packages/core

      - name: Build registry-server (CLI registry tests import its built output)
        run: npm run build -w packages/registry-server

      - name: Build CLI package
        run: npm run build -w packages/cli

      - name: Run CLI unit tests
        run: npm run test -w packages/cli

      - name: Run CLI coverage
        run: npm run coverage -w packages/cli

      - name: Upload CLI unit coverage report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/cli/coverage/

      - name: Run migration integration with coverage
        run: npm run coverage:pg -w packages/cli

      - name: Upload migration coverage report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-migration-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/cli/coverage/

  # ── memory-leak: Memory safety & wire protocol ─────────────────────────
  # Purpose:   Run memory leak detection tests and wire protocol compliance
  #            tests. No PostgreSQL needed — the wire driver is tested using
  #            a mock TCP server. Isolates memory-sensitive tests.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20 and 22 (fail-fast disabled)
  # Timeout:   15 minutes (leak tests can be slow under GC pressure)
  memory-leak:
    name: Memory Leak (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: TypeScript compilation (with tests)
        run: npm run build:app -w packages/core

      - name: Run memory leak and wire protocol tests
        run: node --test packages/core/dist/tests/memory-leak.test.js packages/core/dist/tests/wire-protocol.test.js

  # ── upgrade-codemods: Upgrade System codemod verification (Req 8.8) ─────
  # Purpose:   Run the codemod test suite against the migration examples through
  #            the zero-dependency CommandRunner, emitting the machine-readable
  #            `upgrade.codemods` Verification Artifact. The runner assigns the
  #            status and writes the artifact atomically; this job uploads it as
  #            retained CI evidence.
  # Depends:   Nothing (independent parallel job — pure logic, no services)
  # Timeout:   10 minutes (well under the runner's 300s per-command bound)
  upgrade-codemods:
    name: Upgrade Codemods Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build core package
        run: npm run build -w packages/core

      - name: Run codemod test suite + emit upgrade.codemods artifact
        run: npm run verify:codemods

      - name: Upload upgrade.codemods Verification Artifact
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upgrade-codemods-artifact-${{ github.sha }}
          path: verification-artifacts/upgrade/

  # ── system-tests: Parallelized system-level test suites ────────────────
  # Purpose:   Run comprehensive system-level tests across all 6 suites in
  #            parallel via a matrix dimension. Each suite (security, memory-
  #            safety, load-testing, fuzz-testing, chaos-testing,
  #            infrastructure) runs on its own runner for maximum isolation.
  # Depends:   Nothing (independent parallel job)
  # Matrix:    Node 20/22 × 6 suites = 12 runners (fail-fast disabled)
  # Timeout:   20 minutes (build + test; infrastructure includes openssl cert gen)
  # Dispatch:  Single suite selection via workflow_dispatch input filters
  #            which suites run (the if: condition skips unmatched suites).
  # Note:      Infrastructure tests set PG_HOST="" to skip PG-dependent cases.
  system-tests:
    name: ${{ matrix.suite }} (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
        suite: [security, memory-safety, load-testing, fuzz-testing, chaos-testing, infrastructure]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node }}

      - name: TypeScript compilation (with tests)
        run: npm run build:app -w packages/core

      - name: Run ${{ matrix.suite }} tests
        if: (env.SUITE == 'all' || env.SUITE == matrix.suite) && matrix.suite != 'infrastructure'
        run: node --test packages/core/dist/tests/system/${{ matrix.suite }}.test.js

      - name: Run infrastructure tests
        if: (env.SUITE == 'all' || env.SUITE == 'infrastructure') && matrix.suite == 'infrastructure'
        run: node --test packages/core/dist/tests/system/infrastructure.test.js
        env:
          PG_HOST: ''



  # ── mysql-integration: MySQL 8.0 integration tests ────────────────────
  # Purpose:   Run MySQL wire protocol integration tests against a live
  #            MySQL 8.0 instance.
  # Depends:   Nothing (independent parallel job)
  mysql-integration:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: street_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: npm run build -w packages/core

      # MySQL 8 defaults to caching_sha2_password, whose full-auth path sends the
      # password in cleartext (or RSA) — the Street driver refuses cleartext over a
      # non-TLS link by design. CI's MySQL service container can't override the
      # default auth plugin (GitHub service containers have no `command:`), and its
      # health check doesn't prime the auth cache, so a direct root connection
      # fails. Create a mysql_native_password user and connect as that instead
      # (the `mysql` CLI can provision it because it supports RSA key exchange).
      - name: Create MySQL native-password user
        run: |
          mysql -h 127.0.0.1 -uroot -ptestpass -e "
            CREATE USER IF NOT EXISTS 'streetnat'@'%' IDENTIFIED WITH mysql_native_password BY 'natpass';
            GRANT ALL PRIVILEGES ON street_test.* TO 'streetnat'@'%'; FLUSH PRIVILEGES;"

      - name: MySQL integration tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: streetnat
          MYSQL_PASSWORD: natpass
          MYSQL_DATABASE: street_test
        run: node --test packages/core/dist/tests/mysql.test.js

  # ── benchmark: Performance Benchmarks ─────────────────────────────────
  # Purpose:   Run HTTP throughput benchmarks for Street framework.
  #            Runs the HTTP throughput benchmark and enforces the regression
  #            gate (>10% drop from baseline fails the build).
  # Depends:   build-and-test
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build
        run: npm run build -w packages/core

      - name: Run benchmarks (with regression gate)
        run: node packages/core/dist/benchmarks/run.js --baseline packages/core/dist/benchmarks/baseline.json

  # ── security-lint: Static analysis for workflow security ───────────────
  # Purpose:   Run zizmor — a static analyzer for GitHub Actions workflows.
  #            Scans all .yml/.yaml files for credential leaks, injection,
  #            and other CI security antipatterns.
  # Depends:   Nothing (independent, fastest job at ~2 min)
  # Timeout:   5 minutes (generous for static analysis)
  # Config:    medium+ severity, annotations on PRs, no advanced security
  security-lint:
    name: Security Lint (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          min-severity: medium
          advanced-security: false
          annotations: true

  # ── policy-checks: Absolute implementation policy enforcement (51.1, 51.5) ─
  # Purpose:   Fail the build if banned placeholder markers (TODO/FIXME/HACK/
  #            @ts-ignore) appear in shipped source, and run a high-severity
  #            dependency audit.
  # Depends:   Nothing (independent, fast)
  policy-checks:
    name: Policy Checks (no-placeholders + audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Scan for banned placeholder markers in shipped source
        run: |
          # Excludes test files; scans the production source tree only.
          if grep -RInE '\b(TODO|FIXME|HACK)\b|@ts-ignore' \
               --include='*.ts' \
               --exclude-dir=tests \
               --exclude-dir=integration \
               packages/core/src; then
            echo "::error::Banned placeholder markers (TODO/FIXME/HACK/@ts-ignore) found in packages/core/src"
            exit 1
          fi
          echo "No banned placeholder markers found ✔"

      - name: High-severity dependency audit
        run: npm audit --audit-level=high

  # ── package-integrity: tarball completeness + clean-install import ─────
  # Purpose:   Catch the class of publish bug where a shipped module imports a
  #            file that is NOT included in the npm tarball — which makes a clean
  #            install crash with ERR_MODULE_NOT_FOUND even though the build
  #            passed. Covers all three publishable packages:
  #              • streetjs        (packages/core)
  #              • @streetjs/cli   (packages/cli)
  #              • @streetjs/core  (packages/core-compat, the re-export shim)
  #            Two gates per package:
  #              1. verify:pack — closed-world static check that every relative
  #                 import in every published module resolves within the tarball.
  #              2. clean-install smoke — `npm ci` the packed tarball(s) from a
  #                 committed fixture lockfile and import / run for real. The CLI
  #                 and compat shim depend on `streetjs`, so the locally packed
  #                 core tarball is installed alongside them to pin the dependency
  #                 to THIS build (never the previously published, possibly broken,
  #                 one).
  # Depends:   Nothing (independent, fast). Runs on every PR/push so a broken
  #            `files` allow-list is caught long before a release tag.
  package-integrity:
    name: Package Integrity (pack + clean-install import)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build packages + generate the compat shim
        run: |
          npm run build -w packages/core
          npm run build -w packages/registry-server
          npm run build -w packages/cli
          node scripts/gen-core-compat.mjs

      - name: Verify tarball integrity (streetjs, @streetjs/cli, @streetjs/core shim)
        run: |
          npm run verify:pack -w packages/core
          npm run verify:pack -w packages/cli
          ( cd packages/core-compat && node ../../scripts/verify-package.mjs )

      - name: Pack tarballs
        run: |
          set -euo pipefail
          echo "CORE_TARBALL=$PWD/packages/core/$(cd packages/core && npm pack --silent)" >> "$GITHUB_ENV"
          echo "CLI_TARBALL=$PWD/packages/cli/$(cd packages/cli && npm pack --silent)" >> "$GITHUB_ENV"
          echo "COMPAT_TARBALL=$PWD/packages/core-compat/$(cd packages/core-compat && npm pack --silent)" >> "$GITHUB_ENV"

      - name: Clean-install smoke — import streetjs from the packed tarball
        run: |
          set -euo pipefail
          # Copy the freshly packed tarball into the committed smoke fixture and
          # install strictly from its lockfile with `npm ci` (no mutable/network
          # resolution of the package under test). The fixture's lockfile pins the
          # transitive deps by integrity; only the local tarball — the artifact we
          # are verifying — is unpinned, by design.
          cp "$CORE_TARBALL" ci/pack-smoke/core/streetjs.tgz
          cd ci/pack-smoke/core
          npm ci --no-audit --no-fund --loglevel=error
          node --input-type=module -e "import('streetjs').then(m => { const n = Object.keys(m).length; if (n < 1) { console.error('::error::clean import of streetjs exported no symbols'); process.exit(1); } console.log('streetjs clean-install import OK — ' + n + ' exports'); }).catch(err => { console.error('::error::clean import of streetjs failed: ' + err.code + ' ' + err.message); process.exit(1); })"

      - name: Clean-install smoke — @streetjs/cli runs against the local streetjs build
        run: |
          set -euo pipefail
          # Copy both tarballs into the fixture so the CLI's `streetjs` dependency
          # dedupes onto THIS build (never a previously published, possibly broken
          # one), then install strictly from the lockfile with `npm ci`.
          cp "$CORE_TARBALL" ci/pack-smoke/cli/streetjs.tgz
          cp "$CLI_TARBALL" ci/pack-smoke/cli/street-cli.tgz
          cd ci/pack-smoke/cli
          npm ci --no-audit --no-fund --loglevel=error
          # Invoke the installed bin directly (more deterministic than npx flags).
          ./node_modules/.bin/street --version
          ./node_modules/.bin/street --help >/dev/null
          echo "@streetjs/cli clean-install smoke OK"

      - name: Clean-install smoke — @streetjs/core shim re-exports the local streetjs
        run: |
          set -euo pipefail
          # compat pins streetjs to the exact version; the local core tarball
          # (same version) satisfies it, so the shim is exercised against THIS build.
          cp "$CORE_TARBALL" ci/pack-smoke/compat/streetjs.tgz
          cp "$COMPAT_TARBALL" ci/pack-smoke/compat/street-core-compat.tgz
          cd ci/pack-smoke/compat
          npm ci --no-audit --no-fund --loglevel=error
          node --input-type=module -e "import('@streetjs/core').then(m => { const n = Object.keys(m).length; if (n < 1) { console.error('::error::@streetjs/core shim exported no symbols'); process.exit(1); } console.log('@streetjs/core shim clean-install import OK — ' + n + ' exports'); }).catch(err => { console.error('::error::@streetjs/core shim import failed: ' + err.code + ' ' + err.message); process.exit(1); })"

  # ── certification: certification suites + DB E2E (release gate) ─────────
  # Purpose:   Run the security/observability/deployment/enterprise/
  #            documentation/repository certification suites plus the
  #            PostgreSQL and MySQL end-to-end certification suites against
  #            real service containers. Fails the build if any gate fails.
  certification:
    name: Certification Suites + DB E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: street_test
          POSTGRES_USER: street
          POSTGRES_PASSWORD: streetpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: street_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build core
        run: npm run build -w packages/core

      - name: Compile tests
        run: npx tsc
        working-directory: packages/core

      - name: Create MySQL native-password user (driver enforces no cleartext over non-TLS)
        run: |
          mysql -h 127.0.0.1 -uroot -prootpass -e "
            CREATE USER IF NOT EXISTS 'streetnat'@'%' IDENTIFIED WITH mysql_native_password BY 'natpass';
            GRANT ALL PRIVILEGES ON street_test.* TO 'streetnat'@'%'; FLUSH PRIVILEGES;"

      - name: Run certification suites
        run: node --test dist/tests/certification/*.test.js
        working-directory: packages/core

      - name: Run PostgreSQL E2E certification
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: street
          PG_PASSWORD: streetpass
          PG_DATABASE: street_test
        run: node --test --test-timeout=30000 dist/src/tests/postgres-certification.e2e.test.js
        working-directory: packages/core

      - name: Run MySQL E2E certification
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: streetnat
          MYSQL_PASSWORD: natpass
          MYSQL_DATABASE: street_test
        run: node --test --test-timeout=30000 dist/src/tests/mysql-certification.e2e.test.js
        working-directory: packages/core

  # ── summary: Post-system-test summary step ─────────────────────────────
  # Purpose:   Print a summary of system test results to the GitHub Actions
  #            job summary. Only collects after system-tests completes.
  # Depends:   system-tests (with always() — runs even if tests failed)
  # Note:      Uses GITHUB_STEP_SUMMARY for rich rendering in the UI.
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: system-tests
    if: always()

    steps:
      - name: Summarize results
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          SUITE_SELECTED: ${{ env.SUITE }}
        run: |
          echo "## System Tests Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`$REF_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** $SHA" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`$EVENT_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Suite:** $SUITE_SELECTED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "System tests ran across 6 parallel suites (security, memory-safety, load-testing, fuzz-testing, chaos-testing, infrastructure), each on Node 20 and 22." >> $GITHUB_STEP_SUMMARY

  # ── docker-build: Container image build & push ─────────────────────────
  # Purpose:   Build a distroless Docker image and push to GitHub Container
  #            Registry. Only runs on main branch after core tests pass.
  # Depends:   build-and-test (waits for integration tests to pass)
  # Trigger:   Push to main branch only
  # Permissions: packages: write (contents: read inherited from workflow level)
  # Tags:      :latest and :<commit-sha>
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ── test-and-publish: npm provenance publish ───────────────────────────
  # Purpose:   Verify package version matches git tag, build with tests,
  #            lint, then publish both @streetjs/core and @streetjs/cli to
  #            npm with provenance attestation.
  # Depends:   build-and-test (waits for core integration tests to pass)
  # Trigger:   Semver tag push only (v*.*.*)
  # Timeout:   15 minutes
  # Permissions: id-token: write (npm provenance requires OIDC token)
  # Concurrency: Separate group (publish-${{ github.ref }}) to avoid
  #              cancellation of a publish run by subsequent CI pushes.
  # Steps:
  #   1. Version match — ensures git tag matches packages/core/package.json
  #      AND packages/cli/package.json (both must be in sync)
  #   2. Build both packages
  #   3. Validate pack output — no test files, no dist/src duplication
  #   4. Smoke test — street create validates scaffolding
  #   5. Publish @streetjs/core with provenance
  #   6. Publish @streetjs/cli with provenance
  test-and-publish:
    name: Test & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-test, migration-integration]
    if: startsWith(github.ref, 'refs/tags/v')

    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          COMPAT_VERSION=$(node -p "require('./packages/core-compat/package.json').version")
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")

          # packages/core is the renamed primary package `streetjs`.
          if [ "$TAG_VERSION" != "$CORE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match streetjs (packages/core/package.json: $CORE_VERSION)"
            exit 1
          fi
          # packages/core-compat is the @streetjs/core backward-compat shim.
          if [ "$TAG_VERSION" != "$COMPAT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match @streetjs/core (packages/core-compat/package.json: $COMPAT_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match packages/cli/package.json ($CLI_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION ✔ (streetjs, @streetjs/core, @streetjs/cli)"

      - name: Build @streetjs/core
        run: npm run clean -w packages/core && npm run build -w packages/core

      - name: Build @streetjs/cli
        run: npm run clean -w packages/cli && npm run build -w packages/cli

      - name: Run CLI test suite
        run: npm run test -w packages/cli

      - name: Validate @streetjs/core pack (no test files, no dist/src)
        run: |
          PACK=$(cd packages/core && npm pack --dry-run 2>&1)
          if echo "$PACK" | grep -q 'dist/tests/'; then
            echo "::error::@streetjs/core pack contains dist/tests/ — test files must not be published"
            exit 1
          fi
          if echo "$PACK" | grep -q 'dist/src/'; then
            echo "::error::@streetjs/core pack contains dist/src/ — stale build artifact"
            exit 1
          fi
          echo "Core pack validation: OK"
          echo "$PACK" | grep 'total files'

      - name: Verify @streetjs/core tarball integrity (every exported module ships)
        run: npm run verify:pack -w packages/core

      - name: Smoke test — clean install + import streetjs from the packed tarball
        run: |
          set -euo pipefail
          TARBALL="$(cd packages/core && npm pack --silent)"
          # Install strictly from the committed fixture lockfile with `npm ci`
          # (pinned); the local tarball is the artifact under verification.
          cp "$PWD/packages/core/$TARBALL" ci/pack-smoke/core/streetjs.tgz
          cd ci/pack-smoke/core
          npm ci --no-audit --no-fund --loglevel=error
          node --input-type=module -e "import('streetjs').then(m => { const n = Object.keys(m).length; if (n < 1) { console.error('::error::clean import of streetjs exported no symbols'); process.exit(1); } console.log('clean-install import OK — ' + n + ' exports'); }).catch(err => { console.error('::error::clean import of streetjs failed: ' + err.code + ' ' + err.message); process.exit(1); })"

      - name: Validate @streetjs/cli pack (no test files, has bin + templates)
        run: |
          PACK=$(cd packages/cli && npm pack --dry-run 2>&1)
          if echo "$PACK" | grep -q 'dist/tests/'; then
            echo "::error::@streetjs/cli pack contains dist/tests/ — test files must not be published"
            exit 1
          fi
          if ! echo "$PACK" | grep -q 'bin/street.js'; then
            echo "::error::@streetjs/cli pack missing bin/street.js"
            exit 1
          fi
          if ! echo "$PACK" | grep -q 'templates/'; then
            echo "::error::@streetjs/cli pack missing templates/"
            exit 1
          fi
          echo "CLI pack validation: OK"
          echo "$PACK" | grep 'total files'

      - name: Verify @streetjs/cli tarball integrity (every command module ships)
        run: npm run verify:pack -w packages/cli

      - name: Smoke test — street create
        run: |
          # Link CLI globally for smoke test
          cd packages/cli && npm link && cd ../..
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          street create smoke-test

          # Validate required paths
          for path in \
            smoke-test/package.json \
            smoke-test/tsconfig.json \
            smoke-test/Dockerfile \
            smoke-test/street.config.ts \
            smoke-test/README.md \
            smoke-test/src/main.ts \
            smoke-test/src/controllers \
            smoke-test/src/services \
            smoke-test/src/repositories \
            smoke-test/src/middleware \
            smoke-test/src/gateways \
            smoke-test/migrations \
            smoke-test/uploads \
            smoke-test/tests; do
            if [ ! -e "$path" ]; then
              echo "::error::Smoke test: missing $path"
              exit 1
            fi
          done
          echo "Smoke test: all required paths present ✔"

      - name: Lint @streetjs/core
        run: npm run lint -w packages/core

      - name: Publish streetjs to npm
        run: npm publish -w packages/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Regenerate + verify @streetjs/core compat shim
        run: |
          set -euo pipefail
          # Regenerate the shim from the freshly built streetjs so its surface and
          # version never drift, then verify the tarball is self-contained.
          node scripts/gen-core-compat.mjs
          ( cd packages/core-compat && node ../../scripts/verify-package.mjs )

      - name: Publish @streetjs/core (compat shim) to npm
        run: npm publish -w packages/core-compat --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @streetjs/cli to npm
        run: npm publish -w packages/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Mark @streetjs/core deprecated AFTER streetjs + the compat shim are
      # published, so the "install streetjs instead" message is actionable.
      # Deprecation only prints a warning — @streetjs/core stays installable and
      # keeps re-exporting streetjs. Runs last; a failure here does not unpublish
      # anything (re-run `npm deprecate` manually if the token lacks permission).
      - name: Deprecate @streetjs/core (renamed to streetjs)
        run: npm deprecate @streetjs/core "Renamed to 'streetjs'. Install 'streetjs' instead; @streetjs/core re-exports it unchanged. See https://github.com/hassanmubiru/street/blob/main/docs/migration.md"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
