name: street CI/CD

# Merged CI workflow — core & CLI packages, unit & integration tests.
# Jobs run in parallel on separate runners for fast feedback.
# Postgres is available for the core and CLI migration integration jobs.

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  POSTGRES_DB: street_test
  POSTGRES_USER: street
  POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  # ── Core package: build + integration tests with Postgres ──────────────
  build-and-test:
    name: Core (Postgres)
    runs-on: ubuntu-latest

    env:
      KEK: ${{ secrets.KEK }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: street_test
          POSTGRES_USER: street
          POSTGRES_PASSWORD: ${{ secrets.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate YAML syntax
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os, sys, yaml
          errors = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git')]
              for f in files:
                  if not (f.endswith('.yml') or f.endswith('.yaml')):
                      continue
                  path = os.path.join(root, f)
                  try:
                      yaml.safe_load(open(path))
                  except yaml.YAMLError as e:
                      msg = str(e).replace('\n', ' | ')
                      print(f'::error title=YAML Syntax Error,file={path}::{msg}')
                      errors += 1
                      continue
                  print(f'  OK: {path}')
          if errors:
              sys.exit(1)
          PYEOF

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check & build (with tests)
        run: npm run build:app -w packages/core

      - name: Run integration tests with coverage
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DATABASE: street_test
          PG_USER: street
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          KEK: ${{ secrets.KEK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          PORT: "3001"
        run: npm run coverage -w packages/core

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: core-coverage-${{ github.sha }}
          path: packages/core/coverage/

  # ── CLI unit tests (no external dependencies) ──────────────────────────
  test-cli-unit:
    name: CLI Unit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core package (CLI dependency)
        run: npm run build -w packages/core

      - name: Build CLI package
        run: npm run build -w packages/cli

      - name: Run CLI tests
        run: npm run test -w packages/cli

      - name: Run CLI coverage
        run: npm run coverage -w packages/cli

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-coverage-${{ github.sha }}
          path: packages/cli/coverage/

  # ── CLI migration integration tests with Postgres ──────────────────────
  migration-integration:
    name: CLI Migration (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_HOST: localhost
      PG_PORT: ${{ env.POSTGRES_PORT }}
      PG_USER: ${{ env.POSTGRES_USER }}
      PG_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
      PG_DATABASE: ${{ env.POSTGRES_DB }}

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core package (CLI dependency)
        run: npm run build -w packages/core

      - name: Build CLI package
        run: npm run build -w packages/cli

      - name: Run migration integration with coverage
        run: npm run coverage:pg -w packages/cli

      - name: Upload migration coverage report
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-migration-coverage-${{ github.sha }}
          path: packages/cli/coverage/

  # ── Docker build (depends on core tests passing) ───────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
