name: street CI/CD

# Merged CI workflow — core & CLI packages, unit & integration, memory leak, and system tests.
# Jobs run in parallel on separate runners for fast feedback.
# Postgres is available for the core and CLI migration integration jobs.
# Use workflow_dispatch with a suite input to run a specific system test suite.

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Run a specific system test suite (leave blank for all)'
        required: false
        type: choice
        options:
          - all
          - security
          - memory-safety
          - load-testing
          - fuzz-testing
          - chaos-testing
          - infrastructure
        default: all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PG_HOST: localhost
  PG_PORT: 5432
  PG_USER: street
  PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
  PG_DATABASE: street_test
  SUITE: ${{ inputs.suite || 'all' }}

jobs:
  # ── Core package: build + integration tests with Postgres ──────────────
  build-and-test:
    name: Core (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    env:
      KEK: ${{ secrets.KEK }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.PG_DATABASE }}
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate YAML syntax
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os, sys, yaml
          errors = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git')]
              for f in files:
                  if not (f.endswith('.yml') or f.endswith('.yaml')):
                      continue
                  path = os.path.join(root, f)
                  try:
                      yaml.safe_load(open(path))
                  except yaml.YAMLError as e:
                      msg = str(e).replace('\n', ' | ')
                      print(f'::error title=YAML Syntax Error,file={path}::{msg}')
                      errors += 1
                      continue
                  print(f'  OK: {path}')
          if errors:
              sys.exit(1)
          PYEOF

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check & build (with tests)
        run: npm run build:app -w packages/core

      - name: Run integration tests with coverage
        env:
          PG_HOST: ${{ env.PG_HOST }}
          PG_PORT: ${{ env.PG_PORT }}
          PG_DATABASE: ${{ env.PG_DATABASE }}
          PG_USER: ${{ env.PG_USER }}
          PG_PASSWORD: ${{ env.PG_PASSWORD }}
          KEK: ${{ secrets.KEK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          PORT: "3001"
        run: npm run coverage -w packages/core

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/core/coverage/

  # ── CLI unit tests (no external dependencies) ──────────────────────────
  test-cli-unit:
    name: CLI Unit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core package (CLI dependency)
        run: npm run build -w packages/core

      - name: Build CLI package
        run: npm run build -w packages/cli

      - name: Run CLI tests
        run: npm run test -w packages/cli

      - name: Run CLI coverage
        run: npm run coverage -w packages/cli

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/cli/coverage/

  # ── CLI migration integration tests with Postgres ──────────────────────
  migration-integration:
    name: CLI Migration (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.PG_DATABASE }}
          POSTGRES_USER: ${{ env.PG_USER }}
          POSTGRES_PASSWORD: ${{ env.PG_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_HOST: ${{ env.PG_HOST }}
      PG_PORT: ${{ env.PG_PORT }}
      PG_USER: ${{ env.PG_USER }}
      PG_PASSWORD: ${{ env.PG_PASSWORD }}
      PG_DATABASE: ${{ env.PG_DATABASE }}

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core package (CLI dependency)
        run: npm run build -w packages/core

      - name: Build CLI package
        run: npm run build -w packages/cli

      - name: Run migration integration with coverage
        run: npm run coverage:pg -w packages/cli

      - name: Upload migration coverage report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-migration-coverage-${{ matrix.node }}-${{ github.sha }}
          path: packages/cli/coverage/

  # ── Memory leak & wire protocol tests (no external dependencies) ──────
  memory-leak:
    name: Memory Leak (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation (with tests)
        run: npm run build:app -w packages/core

      - name: Run memory leak and wire protocol tests
        run: node --test packages/core/dist/tests/memory-leak.test.js packages/core/dist/tests/wire-protocol.test.js

  # ── System tests: security, memory-safety, load, fuzz, chaos, infra ──
  system-tests:
    name: System Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation (with tests)
        run: npm run build:app -w packages/core

      - name: Run security tests
        if: env.SUITE == 'all' || env.SUITE == 'security'
        run: node --test packages/core/dist/tests/system/security.test.js

      - name: Run memory-safety tests
        if: env.SUITE == 'all' || env.SUITE == 'memory-safety'
        run: node --test packages/core/dist/tests/system/memory-safety.test.js

      - name: Run load-testing tests
        if: env.SUITE == 'all' || env.SUITE == 'load-testing'
        run: node --test packages/core/dist/tests/system/load-testing.test.js

      - name: Run fuzz-testing tests
        if: env.SUITE == 'all' || env.SUITE == 'fuzz-testing'
        run: node --test packages/core/dist/tests/system/fuzz-testing.test.js

      - name: Run chaos-testing tests
        if: env.SUITE == 'all' || env.SUITE == 'chaos-testing'
        run: node --test packages/core/dist/tests/system/chaos-testing.test.js

      - name: Run infrastructure tests (no PG)
        if: env.SUITE == 'all' || env.SUITE == 'infrastructure'
        run: node --test packages/core/dist/tests/system/infrastructure.test.js
        env:
          PG_HOST: ""

      - name: Run unified system test runner
        if: env.SUITE == 'all'
        run: node packages/core/dist/tests/system/runner.js --ci --json --skip-pg

      - name: Upload system test results
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: system-test-results-${{ matrix.node }}-${{ github.sha }}
          path: packages/core/tests/system/system-test-results.json

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: system-tests
    if: always()

    steps:
      - name: Summarize results
        run: |
          echo "## System Tests Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All 6 system test suites executed (security, memory-safety, load-testing, fuzz-testing, chaos-testing, infrastructure)." >> $GITHUB_STEP_SUMMARY

  # ── Docker build (depends on core tests passing) ───────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
