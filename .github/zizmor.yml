# zizmor configuration for the StreetJS repository.
#
# The `examples/scaffold-*/` directories are GENERATED sample scaffolds produced by
# `street create` (referenced in STARTER-CATALOG-PLAN.md). Their CI workflows use
# readable, conventional `@vN` action references on purpose — pinning a user-facing
# starter template to commit SHAs is poor scaffold UX and goes stale immediately.
# zizmor must lint StreetJS's OWN workflows (`.github/workflows/*`, `.github/actions/*`),
# not these generated example outputs. We therefore ignore the framework's blanket
# hash-pinning + credential-persistence rules for the four generated scaffold CIs.
#
# (No framework workflow is named `ci.yml`; the framework uses `ci-cd.yml`,
#  `client-ci.yml`, `frontend-ci.yml`, etc. — so these paths are unambiguous.)
rules:
  unpinned-uses:
    ignore:
      - examples/scaffold-htmx/.github/workflows/ci.yml
      - examples/scaffold-next/.github/workflows/ci.yml
      - examples/scaffold-none/.github/workflows/ci.yml
      - examples/scaffold-react/.github/workflows/ci.yml
  artipacked:
    ignore:
      - examples/scaffold-htmx/.github/workflows/ci.yml
      - examples/scaffold-next/.github/workflows/ci.yml
      - examples/scaffold-none/.github/workflows/ci.yml
      - examples/scaffold-react/.github/workflows/ci.yml
