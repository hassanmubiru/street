# Keep GitHub Actions and npm dependencies up to date
# Dependabot will create PRs to update SHA-pinned actions and npm packages

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    # Group all action updates into a single PR per week
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    # Keep up to 5 open PRs for actions at any time
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    # Group dev dependencies into one PR, runtime deps into another
    groups:
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
    # Keep up to 5 open PRs for npm at any time
    open-pull-requests-limit: 5
    # Don't bump the lockfile-only version — we want actual version bumps
    versioning-strategy: increase
    cooldown:
      default-days: 7

  # Frontend SPA sub-apps (scaffold samples + examples) have their OWN
  # package.json outside the root npm workspace, so the root npm entry above does
  # not cover them. Track them explicitly (e.g. the vite dev-server advisories).
  # NOTE: Dependabot needs a committed lockfile in each dir to resolve versions —
  # run `npm install` in each and commit package-lock.json.
  - package-ecosystem: "npm"
    directories:
      - "/examples/scaffold-react/web"
      - "/examples/scaffold-next/web"
      - "/examples/marzpay-react/web"
      - "/examples/marzpay-next/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    groups:
      web-development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
      web-production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    cooldown:
      default-days: 7

  # Keep the SHA-pinned Docker base images current. Base images are pinned by
  # digest (Scorecard Pinned-Dependencies); Dependabot raises PRs to bump the
  # digests so pinning never means shipping a stale, vulnerable base layer.
  - package-ecosystem: "docker"
    directories:
      - "/infra/docker"
      - "/app-htmx"
      - "/app-next"
      - "/app-none"
      - "/app-react"
      - "/demos"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/packages/registry-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
