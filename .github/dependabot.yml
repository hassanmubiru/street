# Keep GitHub Actions and npm dependencies up to date
# Dependabot will create PRs to update SHA-pinned actions and npm packages

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    # Group all action updates into a single PR per week
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    # Keep up to 5 open PRs for actions at any time
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    # Group dev dependencies into one PR, runtime deps into another
    groups:
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "npm"
    # Keep up to 5 open PRs for npm at any time
    open-pull-requests-limit: 5
    # Don't bump the lockfile-only version — we want actual version bumps
    versioning-strategy: increase
    cooldown:
      default-days: 7

  # Keep the SHA-pinned Docker base images current. Base images are pinned by
  # digest (Scorecard Pinned-Dependencies); Dependabot raises PRs to bump the
  # digests so pinning never means shipping a stale, vulnerable base layer.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/packages/registry-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
