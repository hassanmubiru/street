# ── Reusable setup: Node.js + deps ───────────────────────────────────────
# Reduces ~12 lines of boilerplate per job down to 1. Every job in the
# consolidated ci-cd.yml uses this after an explicit actions/checkout.
name: Setup Node.js & Install
description: Setup Node.js with caching and install dependencies

inputs:
  node-version:
    description: Node.js version to install (e.g. '20', '22')
    required: false
    default: '20'
  registry-url:
    description: npm registry URL (for publish job)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      run: npm ci
      shell: bash
