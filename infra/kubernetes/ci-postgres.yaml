# infra/kubernetes/ci-postgres.yaml
# Ephemeral PostgreSQL for the deploy-verify (kind) smoke ONLY.
#
# The Street app requires a reachable database for its readiness probe
# (/health/ready runs `SELECT 1`), so the live Kubernetes verification needs a
# database in-cluster for the deployment to become Ready. This is a disposable,
# in-cluster Postgres with well-known non-secret CI credentials — it is created
# on an ephemeral kind cluster that is destroyed at the end of the job and is
# never exposed outside it. Do NOT use these values for anything real.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-postgres
  labels:
    app.kubernetes.io/name: ci-postgres
    app.kubernetes.io/managed-by: street-ci
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ci-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ci-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: street
            - name: POSTGRES_PASSWORD
              value: street_secret
            - name: POSTGRES_DB
              value: street_test
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "street", "-d", "street_test"]
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 20
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "street", "-d", "street_test"]
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ci-postgres
  labels:
    app.kubernetes.io/name: ci-postgres
spec:
  selector:
    app.kubernetes.io/name: ci-postgres
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: postgres
  type: ClusterIP
