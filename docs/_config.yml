# ── Site identity ─────────────────────────────────────────────────────────────
title:       "Street Framework"
tagline:     "TypeScript Backend Framework — No Express. No pg. No Prisma."
description: "Street is a production-grade, memory-safe TypeScript backend framework built on Node.js core. Native PostgreSQL driver, JWT, WebSockets, clustering — 2 dependencies."
url:         "https://hassanmubiru.github.io"
baseurl:     "/street"
lang:        "en"

# ── SEO ───────────────────────────────────────────────────────────────────────
author:      "street contributors"
twitter:
  username:  streetjs
  card:      summary_large_image
logo:        "/assets/images/logo.svg"
# Default social-share image (jekyll-seo-tag → og:image / twitter:image)
image:       "/assets/images/og.png"

# ── Theme ─────────────────────────────────────────────────────────────────────
# just-the-docs is installed as a gem (see Gemfile), so use `theme`, not
# `remote_theme` (the latter needs the jekyll-remote-theme plugin, which is not
# installed — that left every page unstyled).
theme: just-the-docs

# ── just-the-docs configuration ───────────────────────────────────────────────
color_scheme:    light
search_enabled:  true
search_tokenizer_separator: /[\s\-/]+/

heading_anchors: true
back_to_top:     true
back_to_top_text: "Back to top"

# Nav footer links
footer_content: >
  Copyright &copy; 2026 street contributors.
  Distributed under the <a href="https://github.com/hassanmubiru/street/blob/main/LICENSE">MIT license.</a>
  &nbsp;|&nbsp;
  <a href="https://www.npmjs.com/package/streetjs">npm</a>
  &nbsp;|&nbsp;
  <a href="https://github.com/hassanmubiru/street">GitHub</a>

# Aux links (top-right navigation)
aux_links:
  "GitHub":
    - "https://github.com/hassanmubiru/street"
  "npm":
    - "https://www.npmjs.com/package/streetjs"

aux_links_new_tab: true

# Enable "Edit on GitHub" links on each page
gh_edit_link:           true
gh_edit_link_text:      "Edit this page on GitHub"
gh_edit_repository:     "https://github.com/hassanmubiru/street"
gh_edit_branch:         "main"
gh_edit_source:         docs
gh_edit_view_mode:      "edit"

# Code copy button
enable_copy_code_button: true

# ── Callouts ──────────────────────────────────────────────────────────────────
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

relative_links:
  enabled:     true
  collections: true

# ── Build settings ────────────────────────────────────────────────────────────
markdown:    kramdown
highlighter: rouge

# ── Front-matter defaults ───────────────────────────────────────────────────
# Apply the just-the-docs layout to EVERY page so none render as bare,
# unstyled markdown (previously ~35 pages, incl. the Jobs guide, had no layout).
defaults:
  - scope:
      path: ""
    values:
      layout: default

kramdown:
  input:        GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class:  highlight
    span:
      line_numbers: false
    block:
      line_numbers: true

# ── Exclusions ────────────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "*.gemspec"
  - RELEASE_CHECKLIST.md
  - ROLLBACK.md
