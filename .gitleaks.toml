# Gitleaks configuration for StreetJS.
# Extends the upstream default ruleset and adds project-scoped allowlists for
# well-known public test fixtures (documented emulator keys, obviously-fake
# signing secrets in tests/examples) to keep the scan free of false positives.
#
# Run locally:  gitleaks detect --source . --config .gitleaks.toml --redact
# CI enforces this on every push/PR (see .github/workflows/secret-scan.yml).

title = "StreetJS Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Known public/test fixtures that are not real secrets."

# NOTE: the historical leaked-key commit allowlist (d7bbfc40…) was REMOVED after
# the 2026 history purge (KEY-ROTATION-RUNBOOK §7). A full-history gitleaks scan
# no longer finds `street-signing.key.pem`, confirming the blob is gone from
# branches/tags; the rotated key (anchor 3ae9add0) remains the trust root.

# Paths that only ever contain fixtures, fakes, sample env templates, docs, or
# gitignored build artifacts / local env (never committed source secrets).
paths = [
  '''\.env$''',
  '''\.env\.example$''',
  '''(^|/)dist/''',
  '''(^|/)docs/''',
  '''(^|/)\.next/''',
  '''.*/tests/.*\.test\.(ts|js)$''',
  '''.*/examples/.*''',
  '''packages/.*/example/.*''',
  # Security/audit documentation that quotes example secrets, PEM headers, or
  # provider tokens as illustrative EVIDENCE (not real material). Real own-line
  # PEM key material is still blocked everywhere by the `secrets-guard` and
  # `block-private-keys` CI jobs (anchored own-line regex), so exempting these
  # prose docs from gitleaks does not weaken protection against actual keys.
  '''(^|/)SECURITY-AUDIT\.md$''',
  '''(^|/)security/SECRET-SCANNING-GUIDE\.md$''',
  '''(^|/)security/THREAT-MODEL-2026\.md$''',
]

# Specific well-known/public or obviously-fake values used in tests, docs, and
# sample compose files.
regexes = [
  # Azurite's documented well-known development account key (public constant).
  '''Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==''',
  # Obviously-fake signing secrets used in unit tests / examples.
  '''a-very-secret-signing-key''',
  '''a-very-secret-key-1234''',
  '''street_test_key''',
  '''street_secret''',
  # Placeholder dev-config values in sample docker-compose files.
  '''change-me-in-production''',
  '''0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef''',
  # Placeholder/sample tokens in docs.
  '''sk-\.\.\.''',
  '''sk-ant-\.\.\.''',
  '''sk_test_\.\.\.''',
]

# Hard rule: PEM private key material must never be committed. Added during the
# 2026 signing-key rotation (see KEY-ROTATION-RUNBOOK.md / SECURITY-AUDIT.md F-1,
# F-2). The street-signing path allowlist that previously masked the leaked key
# was removed; gitleaks will now flag the historical d7bbfc40 blob until history
# is purged, which is the intended behaviour.
[[rules]]
id = "pem-private-key-block"
description = "PEM private key material must never be committed"
regex = '''-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP |ENCRYPTED )?PRIVATE KEY-----'''
keywords = ["PRIVATE KEY"]

# ── Cloud / CI credential rules (added with SECURITY-CLASSIFICATION.md) ──
# These complement the upstream default ruleset with explicit, high-signal
# blocks for credentials most relevant to StreetJS's publish/deploy pipelines.

[[rules]]
id = "aws-access-key-id"
description = "AWS Access Key ID"
regex = '''\b(AKIA|ASIA)[A-Z0-9]{16}\b'''
keywords = ["AKIA", "ASIA"]

[[rules]]
id = "gh-pat"
description = "GitHub Personal Access Token"
regex = '''\bghp_[A-Za-z0-9]{36}\b'''
keywords = ["ghp_"]

[[rules]]
id = "npm-authtoken"
description = "npm _authToken in .npmrc"
regex = '''//.+/:_authToken=[A-Za-z0-9._~+/-]{8,}'''
keywords = ["_authToken"]

[[rules]]
id = "gcp-service-account-key"
description = "GCP service-account private_key block"
regex = '''"private_key"\s*:\s*"-----BEGIN PRIVATE KEY-----'''
keywords = ["private_key"]

[[rules]]
id = "kubeconfig-token"
description = "kubeconfig client/bearer token"
regex = '''(client-key-data|token):\s*[A-Za-z0-9+/=._-]{40,}'''
keywords = ["client-key-data"]
